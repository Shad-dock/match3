<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>3 в ряд</title>
    <link rel="stylesheet" href="style.css" />
</head>
<body>
    <!-- МЕНЮ ВЫБОРА РЕЖИМА -->
    <div id="menuOverlay">
        <div id="menuContainer">
            <h1>🍬 3 в ряд</h1>
            <button id="btnEndless" class="menu-btn">♾️ Бесконечный режим</button>
            <button id="btnLevels" class="menu-btn">🎯 Режим уровней</button>
        </div>
    </div>

    <!-- ИГРОВОЙ UI -->
    <div id="gameUI" style="display: none;">
        <div id="app">
            <h1>🍬 3 в ряд</h1>
            
            <div id="levelInfo">
                <span id="levelTitle">Уровень 1</span>
                <span id="levelGoal">Цель: 100 очков</span>
            </div>
            
            <div id="stats">
                <div id="scoreContainer">
                    <span>Счёт:</span>
                    <span id="scoreValue">0</span>
                </div>
                <div id="movesContainer" style="display: none;">
                    <span id="movesLabel">Ходов:</span>
                    <span id="movesValue">0/0</span>
                </div>
                <div id="timerContainer" style="display: none;">
                    <span>⏱️</span>
                    <span id="timerValue">0с</span>
                </div>
            </div>
            
            <canvas id="gameCanvas"></canvas>
            
            <div id="buttonsRow">
                <button id="backBtn" class="game-btn back-btn">← Назад</button>
                <button id="resetBtn" class="game-btn">🔄 Новая игра</button>
            </div>
        </div>
    </div>

    <!-- ОВЕРЛЕЙ ДЛЯ СООБЩЕНИЙ -->
    <div id="gameOverlay" style="display: none;">
        <div id="overlayContent">
            <h2 id="overlayTitle">Сообщение</h2>
            <p id="overlayMessage"></p>
            <button id="overlayBtn">OK</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
